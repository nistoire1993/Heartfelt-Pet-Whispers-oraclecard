<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>寵物心語抽卡系統</title>
<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }

  button {
    margin: 10px;
    padding: 10px 15px;
    font-size: 16px;
  }

  #result {
    margin-top: 30px;
    font-size: 24px;
    font-weight: bold;
  }

  img {
    margin-top: 20px;
    max-width: 200px;
  }
</style>
</head>
<body>

<h2>抽卡系統</h2>

<button onclick="draw('A')">心靈連結卡</button>
<button onclick="draw('B')">健康提示卡</button>
<button onclick="draw('C')">飼主映照卡</button>
<button onclick="draw('ALL')">混抽</button>

<div id="result"></div>
<img id="cardImg" />

<script>

const cards = [];

for (let i = 1; i <= 66; i++) {
  let group = '';
  if (i <= 22) group = 'A';
  else if (i <= 44) group = 'B';
  else group = 'C';

  cards.push({
    id: i,
    group: group,
    name: 寵物心語 ${i}`,
    image: `images/${cardback1}.png` // 
  });
}

// 2. 抽卡功能
function draw(type) {
  let pool = [];

  if (type === 'A') {
    pool = cards.filter(c => c.group === 'A');
  } else if (type === 'B') {
    pool = cards.filter(c => c.group === 'B');
  } else if (type === 'C') {
    pool = cards.filter(c => c.group === 'C');
  } else {
    pool = cards;
  }

  const randomCard = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("result").innerText =
    `你抽到：${randomCard.name}`;

  document.getElementById("cardImg").src =
    randomCard.image;
}
</script>

</body>
</html>
